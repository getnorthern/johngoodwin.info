<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="John Goodwin - Head of Engineering. 24 years in software, the last three spent scaling a small engineering team to 120 people and sixteen squads." />
    <title>John Goodwin - Engineering Leadership</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Inter:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Inter:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Inter:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- This is a client-rendered SPA, so the hero photo's <img> tag doesn't
         exist in the raw HTML until Vue mounts - the browser's preload
         scanner can't discover it on its own. This preload makes the LCP
         image (the hero photo) discoverable immediately from the initial
         document instead of waiting on JS execution. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/john-goodwin.webp"
      imagesrcset="/john-goodwin-96.webp 96w, /john-goodwin-192.webp 192w, /john-goodwin-200.webp 200w, /john-goodwin.webp 400w"
      imagesizes="(max-width: 640px) 96px, 200px"
      fetchpriority="high"
    />

    <!-- Google tag (gtag.js) - the dataLayer/gtag stub is set up immediately so
         no events are lost, but the ~65KB library itself only loads once the
         browser is idle (or on first scroll/interaction), keeping it off the
         critical initial-load path Lighthouse measures. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0PNREYGPSW');

      function loadGtagScript() {
        if (window.__gtagScriptLoaded) return;
        window.__gtagScriptLoaded = true;
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-0PNREYGPSW';
        document.head.appendChild(script);
      }

      ['scroll', 'keydown', 'click', 'touchstart'].forEach(function (event) {
        window.addEventListener(event, loadGtagScript, { once: true, passive: true });
      });

      window.addEventListener('load', function () {
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGtagScript, { timeout: 4000 });
        } else {
          setTimeout(loadGtagScript, 2000);
        }
      });
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
